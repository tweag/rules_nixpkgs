name: Fix Nix SSL cert-file configuration

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        # Even with determinate: false, the Nix installer may write
        # ssl-cert-file = /no-cert-file.crt, which breaks HTTPS tarball
        # fetches (fetchTarball) inside nix-build calls made by Bazel with
        # SSL CA cert error 77. Remove that specific invalid setting so Nix
        # uses the system CA bundle for all HTTPS fetches.
        if sudo grep -rl --include='*.conf' '/no-cert-file\.crt' /etc/nix/ >/dev/null 2>&1; then
          sudo find /etc/nix -name '*.conf' -print0 | \
            xargs -0 sudo perl -i -ne \
              'print unless /^\s*ssl-cert-file\s*=\s*\/no-cert-file\.crt/'
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            sudo systemctl restart nix-daemon
          elif [[ "${RUNNER_OS}" == "macOS" ]]; then
            sudo launchctl kickstart -k system/org.nixos.nix-daemon
          fi
        fi
